<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA redirect
    // This file handles 404s by redirecting to index.html while preserving the path
    // The app then reads the path and navigates to the correct post

    const path = window.location.pathname;
    const search = window.location.search;
    const hash = window.location.hash;

    // Save the path to sessionStorage so the app can read it after redirect
    sessionStorage.setItem('spa-redirect-path', path + search + hash);

    // Redirect to root
    window.location.replace('/');
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
